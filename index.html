<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyra Cloud - Sistema de Keys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #fff;
            min-height: 100vh;
        }

        /* LOGIN/REGISTER */
        .auth-container {
            max-width: 450px;
            margin: 50px auto;
            background: #141414;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #ff6b00, #ff3300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo p {
            color: #888;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 10px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #ff6b00;
            border-bottom: 2px solid #ff6b00;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #888;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #ff6b00;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b00, #ff3300);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,0,0.3);
        }

        /* DASHBOARD */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }

        .navbar {
            background: #141414;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b00, #ff3300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #ff6b00, #ff3300);
            color: white;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #ff6b00;
            font-weight: bold;
        }

        .logout-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #141414;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a2a;
        }

        .stat-title {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b00, #ff3300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GERADOR */
        .gerador-card {
            background: #141414;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .gerador-titulo {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ff6b00;
        }

        .duracao-opcoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .duracao-btn {
            padding: 10px 20px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .duracao-btn:hover, .duracao-btn.active {
            background: linear-gradient(135deg, #ff6b00, #ff3300);
        }

        /* KEYS GRID */
        .keys-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .key-card {
            background: #141414;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a2a;
            position: relative;
        }

        .key-card.ativa { border-left: 4px solid #28a745; }
        .key-card.pausada { border-left: 4px solid #ffc107; }
        .key-card.usada { border-left: 4px solid #17a2b8; }
        .key-card.expirada { border-left: 4px solid #dc3545; }

        .key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .key-code {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #ff6b00;
            background: #1e1e1e;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .key-code:hover {
            background: #2a2a2a;
        }

        .key-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-ativa { background: #28a745; color: white; }
        .status-pausada { background: #ffc107; color: black; }
        .status-usada { background: #17a2b8; color: white; }
        .status-expirada { background: #dc3545; color: white; }

        .key-info {
            margin: 15px 0;
            font-size: 14px;
            color: #888;
        }

        .key-info div {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .key-info strong {
            color: white;
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            color: #ff6b00;
            text-align: center;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 8px;
            margin: 10px 0;
        }

        .timer.expirado {
            color: #dc3545;
        }

        .hwid-block {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #ff6b00;
        }

        .key-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .key-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-copy { background: #17a2b8; color: white; }
        .btn-pausar { background: #ffc107; color: black; }
        .btn-ativar { background: #28a745; color: white; }
        .btn-reset { background: #6f42c1; color: white; }
        .btn-add { background: #28a745; color: white; }
        .btn-remove { background: #ffc107; color: black; }
        .btn-excluir { background: #dc3545; color: white; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #141414;
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #2a2a2a;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: #141414;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid;
            animation: slideIn 0.3s;
        }

        .toast.success { border-color: #28a745; }
        .toast.error { border-color: #dc3545; }
        .toast.warning { border-color: #ffc107; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* LOADING */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #2a2a2a;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- AUTH PAGE -->
        <div id="authPage">
            <div class="auth-container">
                <div class="auth-logo">
                    <h1>Zyra Cloud</h1>
                    <p>Sistema de Gerenciamento de Keys</p>
                </div>

                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="showAuthTab('login')">Login</div>
                    <div class="auth-tab" onclick="showAuthTab('register')">Registrar</div>
                </div>

                <!-- LOGIN FORM -->
                <div id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Usuário</label>
                        <input type="text" id="loginUsername" class="form-control" placeholder="Digite seu usuário">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Digite sua senha">
                    </div>
                    <button class="btn btn-primary" onclick="handleLogin()">Entrar</button>
                </div>

                <!-- REGISTER FORM -->
                <div id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>Usuário</label>
                        <input type="text" id="registerUsername" class="form-control" placeholder="Escolha um usuário">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="registerPassword" class="form-control" placeholder="Crie uma senha">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="registerConfirm" class="form-control" placeholder="Confirme sua senha">
                    </div>
                    <button class="btn btn-primary" onclick="handleRegister()">Registrar</button>
                </div>
            </div>
        </div>

        <!-- DASHBOARD PAGE -->
        <div id="dashboardPage" class="dashboard">
            <div class="navbar">
                <div class="nav-logo">Zyra Cloud</div>
                <div class="nav-links">
                    <span class="nav-link active" onclick="showTab('dashboard')">Dashboard</span>
                    <span class="nav-link" onclick="showTab('keys')">Keys</span>
                    <span class="nav-link" onclick="showTab('logs')">Logs</span>
                </div>
                <div class="user-menu">
                    <span class="username" id="currentUsername">Carregando...</span>
                    <button class="logout-btn" onclick="logout()">Sair</button>
                </div>
            </div>

            <!-- DASHBOARD TAB -->
            <div id="dashboard" class="tab-content active">
                <h2>Dashboard</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">Total Keys</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Ativas</div>
                        <div class="stat-value" id="statAtivas">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Usadas</div>
                        <div class="stat-value" id="statUsadas">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">Expiradas</div>
                        <div class="stat-value" id="statExpiradas">0</div>
                    </div>
                </div>

                <!-- GERADOR DE KEY -->
                <div class="gerador-card">
                    <div class="gerador-titulo">🎫 Gerar Nova Key</div>
                    
                    <div class="form-group">
                        <label>Identificador (opcional)</label>
                        <input type="text" id="genIdentificador" class="form-control" placeholder="Ex: Cliente A">
                    </div>

                    <div class="form-group">
                        <label>Tempo de Duração</label>
                        <div class="duracao-opcoes">
                            <button class="duracao-btn" onclick="setTempo(1, 'minutos')">1 min</button>
                            <button class="duracao-btn" onclick="setTempo(5, 'minutos')">5 min</button>
                            <button class="duracao-btn" onclick="setTempo(15, 'minutos')">15 min</button>
                            <button class="duracao-btn" onclick="setTempo(30, 'minutos')">30 min</button>
                            <button class="duracao-btn" onclick="setTempo(1, 'horas')">1 hora</button>
                            <button class="duracao-btn" onclick="setTempo(6, 'horas')">6 horas</button>
                            <button class="duracao-btn" onclick="setTempo(12, 'horas')">12 horas</button>
                            <button class="duracao-btn" onclick="setTempo(1, 'dias')">1 dia</button>
                            <button class="duracao-btn" onclick="setTempo(7, 'dias')">7 dias</button>
                            <button class="duracao-btn" onclick="setTempo(30, 'dias')">30 dias</button>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="genValor" class="form-control" value="1" min="1" style="width:100px;">
                        <select id="genUnidade" class="form-control" style="width:150px;">
                            <option value="minutos">Minutos</option>
                            <option value="horas">Horas</option>
                            <option value="dias">Dias</option>
                        </select>
                        <button class="btn btn-primary" onclick="generateKey()" style="flex:1;">Gerar Key</button>
                    </div>
                </div>

                <!-- ÚLTIMAS KEYS -->
                <div class="gerador-card">
                    <div class="gerador-titulo">📋 Últimas Keys Geradas</div>
                    <div id="recentKeys" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
            </div>

            <!-- KEYS TAB -->
            <div id="keys" class="tab-content">
                <h2>Gerenciar Keys</h2>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="searchKey" placeholder="Buscar key ou HWID..." class="form-control" style="flex:1;" onkeyup="filterKeys()">
                    <button class="btn btn-primary" onclick="exportKeys()">Exportar</button>
                </div>

                <div id="keysContainer" class="keys-grid"></div>
            </div>

            <!-- LOGS TAB -->
            <div id="logs" class="tab-content">
                <h2>Logs do Sistema</h2>
                <div id="logsContainer" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <div class="modal" id="tempoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="tempoTitulo">Modificar Tempo</h3>
                <button class="modal-close" onclick="closeModal('tempoModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="tempoQuantidade" class="form-control" value="1" min="1">
            </div>
            <div class="form-group">
                <label>Unidade</label>
                <select id="tempoUnidade" class="form-control">
                    <option value="minutos">Minutos</option>
                    <option value="horas">Horas</option>
                    <option value="dias">Dias</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex:1;" onclick="confirmTempo()">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // CONFIGURAÇÃO
        const FIREBASE_URL = 'https://key-system-roblox-default-rtdb.firebaseio.com/';
        
        // Estado da aplicação
        let currentUser = null;
        let users = {};
        let keys = {};
        let logs = [];
        
        // Timers
        let timers = {};

        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(FIREBASE_URL + 'users.json');
                const data = await response.json();
                users = data || {};
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showToast('Preencha todos os campos!', 'error');
                return;
            }
            
            await loadUsers();
            
            if (users[username] && users[username].password === password) {
                currentUser = {
                    username: username,
                    ...users[username]
                };
                
                localStorage.setItem('zyra_user', JSON.stringify(currentUser));
                showDashboard();
                showToast('Login realizado com sucesso!', 'success');
            } else {
                showToast('Usuário ou senha inválidos!', 'error');
            }
        }

        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirm = document.getElementById('registerConfirm').value.trim();
            
            if (!username || !password || !confirm) {
                showToast('Preencha todos os campos!', 'error');
                return;
            }
            
            if (password !== confirm) {
                showToast('As senhas não coincidem!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            await loadUsers();
            
            if (users[username]) {
                showToast('Usuário já existe!', 'error');
                return;
            }
            
            users[username] = {
                password: password,
                createdAt: new Date().toISOString(),
                createdBy: 'register'
            };
            
            try {
                await fetch(FIREBASE_URL + 'users.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(users)
                });
                
                showToast('Usuário registrado com sucesso!', 'success');
                showAuthTab('login');
            } catch (error) {
                showToast('Erro ao registrar: ' + error.message, 'error');
            }
        }

        function checkAuth() {
            const user = localStorage.getItem('zyra_user');
            if (user) {
                currentUser = JSON.parse(user);
                showDashboard();
            } else {
                document.getElementById('authPage').style.display = 'block';
                document.getElementById('dashboardPage').style.display = 'none';
            }
        }

        function showDashboard() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            document.getElementById('currentUsername').textContent = currentUser.username;
            loadData();
        }

        function logout() {
            localStorage.removeItem('zyra_user');
            currentUser = null;
            document.getElementById('authPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
        }

        // ============================================
        // CARREGAR DADOS
        // ============================================
        async function loadData() {
            try {
                showToast('Carregando dados...', 'info');
                
                const response = await fetch(FIREBASE_URL + '.json');
                const data = await response.json();
                
                if (data) {
                    keys = data.keys || {};
                    logs = Object.values(data.logs || {}).sort((a, b) => 
                        new Date(b.date) - new Date(a.date)
                    );
                }
                
                updateStats();
                renderKeys();
                renderLogs();
                renderRecentKeys();
                startAllTimers();
                
                showToast('Dados carregados!', 'success');
            } catch (error) {
                console.error('Erro ao carregar:', error);
                showToast('Erro ao carregar dados: ' + error.message, 'error');
            }
        }

        async function saveData() {
            try {
                await fetch(FIREBASE_URL + '.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keys, logs: arrayToObject(logs), users })
                });
            } catch (error) {
                console.error('Erro ao salvar:', error);
                showToast('Erro ao salvar: ' + error.message, 'error');
            }
        }

        function arrayToObject(arr) {
            return arr.reduce((acc, item, i) => {
                acc[i] = item;
                return acc;
            }, {});
        }

        // ============================================
        // TIMER
        // ============================================
        function startTimer(keyId, expiresAt) {
            if (timers[keyId]) clearInterval(timers[keyId]);
            
            const timerElement = document.getElementById(`timer-${keyId}`);
            if (!timerElement) return;
            
            timers[keyId] = setInterval(() => {
                const now = new Date().getTime();
                const expiry = new Date(expiresAt).getTime();
                const diff = expiry - now;
                
                if (diff <= 0) {
                    timerElement.innerHTML = 'EXPIRADO';
                    timerElement.classList.add('expirado');
                    clearInterval(timers[keyId]);
                    delete timers[keyId];
                    
                    // Atualizar status da key
                    if (keys[keyId]) {
                        keys[keyId].expired = true;
                    }
                } else {
                    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const segundos = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    let tempo = '';
                    if (dias > 0) tempo += `${dias}d `;
                    if (horas > 0 || dias > 0) tempo += `${horas.toString().padStart(2, '0')}h `;
                    tempo += `${minutos.toString().padStart(2, '0')}m ${segundos.toString().padStart(2, '0')}s`;
                    
                    timerElement.innerHTML = tempo;
                    timerElement.classList.remove('expirado');
                }
            }, 1000);
        }

        function startAllTimers() {
            Object.keys(keys).forEach(keyId => {
                if (keys[keyId].expiresAt) {
                    startTimer(keyId, keys[keyId].expiresAt);
                }
            });
        }

        // ============================================
        // GERAR KEY
        // ============================================
        function generateKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 4; i++) {
                if (i > 0) key += '-';
                for (let j = 0; j < 4; j++) {
                    key += chars[Math.floor(Math.random() * chars.length)];
                }
            }
            
            const identificador = document.getElementById('genIdentificador').value || 'Sem identificador';
            const valor = parseInt(document.getElementById('genValor').value);
            const unidade = document.getElementById('genUnidade').value;
            
            // Calcular expiração
            let minutos = 0;
            if (unidade === 'minutos') minutos = valor;
            else if (unidade === 'horas') minutos = valor * 60;
            else if (unidade === 'dias') minutos = valor * 1440;
            
            const expiresAt = new Date(Date.now() + minutos * 60 * 1000);
            
            const keyId = key.replace(/-/g, '_');
            keys[keyId] = {
                key: key,
                identificador: identificador,
                hwidUsado: null,
                nickUsado: null,
                userId: null,
                createdAt: new Date().toISOString(),
                vinculadoAt: null,
                expiresAt: expiresAt.toISOString(),
                used: false,
                paused: false,
                resets: 0,
                maxResets: 5,
                history: [{
                    date: new Date().toISOString(),
                    action: 'created',
                    by: currentUser.username,
                    details: `${identificador} - ${minutos} minutos`
                }]
            };
            
            saveData();
            addLog('GERAR_KEY', { key: key, identificador: identificador });
            showToast(`Key gerada: ${key}`, 'success');
            renderKeys();
            renderRecentKeys();
            startTimer(keyId, expiresAt.toISOString());
        }

        function setTempo(valor, unidade) {
            document.getElementById('genValor').value = valor;
            
            const select = document.getElementById('genUnidade');
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === unidade) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }

        // ============================================
        // RENDERIZAR KEYS
        // ============================================
        function renderKeys() {
            const search = document.getElementById('searchKey')?.value.toLowerCase() || '';
            
            let keysArray = Object.values(keys).sort((a, b) => 
                new Date(b.createdAt) - new Date(a.createdAt)
            );
            
            if (search) {
                keysArray = keysArray.filter(k => 
                    k.key.toLowerCase().includes(search) || 
                    (k.hwidUsado && k.hwidUsado.toLowerCase().includes(search)) ||
                    (k.nickUsado && k.nickUsado.toLowerCase().includes(search))
                );
            }
            
            const container = document.getElementById('keysContainer');
            container.innerHTML = keysArray.map(key => {
                const keyId = key.key.replace(/-/g, '_');
                const status = getKeyStatus(key);
                const statusClass = status;
                const statusText = getStatusText(status);
                
                return `
                    <div class="key-card ${statusClass}">
                        <div class="key-header">
                            <span class="key-code" onclick="copyKey('${key.key}')">${key.key} 📋</span>
                            <span class="key-status status-${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="key-info">
                            <div><strong>Criada:</strong> ${new Date(key.createdAt).toLocaleString()}</div>
                            <div><strong>Expira:</strong> <span id="timer-${keyId}" class="timer">Carregando...</span></div>
                            ${key.vinculadoAt ? `<div><strong>Vinculado em:</strong> ${new Date(key.vinculadoAt).toLocaleString()}</div>` : ''}
                            <div><strong>Identificador:</strong> ${key.identificador || 'Nenhum'}</div>
                            
                            ${key.nickUsado ? `<div><strong>Cliente:</strong> ${key.nickUsado}</div>` : ''}
                            ${key.userId ? `<div><strong>UserID:</strong> ${key.userId}</div>` : ''}
                            
                            ${key.hwidUsado ? `
                                <div><strong>HWID:</strong></div>
                                <div class="hwid-block">${key.hwidUsado}</div>
                            ` : '<div><strong>HWID:</strong> Nenhum</div>'}
                            
                            ${key.used ? `
                                <div><strong>Resets:</strong> ${key.resets || 0}/${key.maxResets || 5}</div>
                            ` : ''}
                        </div>
                        
                        <div class="key-actions">
                            <button class="btn-copy" onclick="copyKey('${key.key}')">📋 Copiar</button>
                            
                            ${!key.paused ? 
                                `<button class="btn-pausar" onclick="pauseKey('${keyId}')">⏸️ Pausar</button>` :
                                `<button class="btn-ativar" onclick="unpauseKey('${keyId}')">▶️ Ativar</button>`
                            }
                            
                            ${key.used ? 
                                `<button class="btn-reset" onclick="resetKey('${keyId}')">🔄 Reset</button>` : ''
                            }
                            
                            <button class="btn-add" onclick="showAddTempo('${keyId}')">➕ Tempo</button>
                            <button class="btn-remove" onclick="showRemoveTempo('${keyId}')">➖ Tempo</button>
                            <button class="btn-excluir" onclick="deleteKey('${keyId}')">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Iniciar timers para as keys renderizadas
            keysArray.forEach(key => {
                const keyId = key.key.replace(/-/g, '_');
                startTimer(keyId, key.expiresAt);
            });
        }

        function getKeyStatus(key) {
            if (key.paused) return 'pausada';
            if (new Date(key.expiresAt) <= new Date()) return 'expirada';
            if (key.used) return 'usada';
            return 'ativa';
        }

        function getStatusText(status) {
            const map = {
                'ativa': 'Ativa',
                'pausada': 'Pausada',
                'usada': 'Usada',
                'expirada': 'Expirada'
            };
            return map[status] || status;
        }

        function renderRecentKeys() {
            const recent = Object.values(keys).sort((a, b) => 
                new Date(b.createdAt) - new Date(a.createdAt)
            ).slice(0, 5);
            
            document.getElementById('recentKeys').innerHTML = recent.map(key => `
                <div style="background: #1e1e1e; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between;">
                    <span style="color:#ff6b00; font-family:monospace;">${key.key}</span>
                    <span>${new Date(key.createdAt).toLocaleTimeString()}</span>
                </div>
            `).join('');
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = logs.map(log => `
                <div style="background: #1e1e1e; padding: 10px; margin-bottom: 5px; border-radius: 8px;">
                    <div style="color:#888;">${new Date(log.date).toLocaleString()}</div>
                    <strong>${log.action}</strong> - ${log.user}
                    <pre style="margin-top:5px; font-size:11px;">${JSON.stringify(log, null, 2)}</pre>
                </div>
            `).join('');
        }

        function updateStats() {
            const keysArray = Object.values(keys);
            document.getElementById('statTotal').textContent = keysArray.length;
            document.getElementById('statAtivas').textContent = keysArray.filter(k => !k.used && !k.paused && new Date(k.expiresAt) > new Date()).length;
            document.getElementById('statUsadas').textContent = keysArray.filter(k => k.used).length;
            document.getElementById('statExpiradas').textContent = keysArray.filter(k => new Date(k.expiresAt) <= new Date()).length;
        }

        // ============================================
        // AÇÕES DAS KEYS
        // ============================================
        function copyKey(key) {
            navigator.clipboard.writeText(key);
            showToast('Key copiada!', 'success');
        }

        async function pauseKey(keyId) {
            keys[keyId].paused = true;
            await saveData();
            addLog('PAUSAR', { key: keys[keyId].key });
            showToast('Key pausada!', 'warning');
            renderKeys();
        }

        async function unpauseKey(keyId) {
            keys[keyId].paused = false;
            await saveData();
            addLog('DESPAUSAR', { key: keys[keyId].key });
            showToast('Key ativada!', 'success');
            renderKeys();
        }

        async function resetKey(keyId) {
            const key = keys[keyId];
            
            if (key.resets >= key.maxResets) {
                showToast('Limite de resets atingido!', 'error');
                return;
            }
            
            key.used = false;
            key.usedAt = null;
            key.hwidUsado = null;
            key.nickUsado = null;
            key.userId = null;
            key.vinculadoAt = null;
            key.resets = (key.resets || 0) + 1;
            
            key.history.push({
                date: new Date().toISOString(),
                action: 'reset',
                by: currentUser.username,
                details: `Resetado - Resets: ${key.resets}/${key.maxResets}`
            });
            
            await saveData();
            addLog('RESET_KEY', { key: key.key });
            showToast('Key resetada!', 'success');
            renderKeys();
        }

        function showAddTempo(keyId) {
            currentKeyId = keyId;
            currentAcao = 'add';
            document.getElementById('tempoTitulo').textContent = 'Adicionar Tempo';
            openModal('tempoModal');
        }

        function showRemoveTempo(keyId) {
            currentKeyId = keyId;
            currentAcao = 'remove';
            document.getElementById('tempoTitulo').textContent = 'Remover Tempo';
            openModal('tempoModal');
        }

        async function confirmTempo() {
            const quantidade = parseInt(document.getElementById('tempoQuantidade').value);
            const unidade = document.getElementById('tempoUnidade').value;
            const key = keys[currentKeyId];
            
            let minutos = 0;
            if (unidade === 'minutos') minutos = quantidade;
            else if (unidade === 'horas') minutos = quantidade * 60;
            else if (unidade === 'dias') minutos = quantidade * 1440;
            
            const currentExpiry = new Date(key.expiresAt);
            
            if (currentAcao === 'add') {
                currentExpiry.setMinutes(currentExpiry.getMinutes() + minutos);
                key.expiresAt = currentExpiry.toISOString();
                
                key.history.push({
                    date: new Date().toISOString(),
                    action: 'add_tempo',
                    by: currentUser.username,
                    details: `+${quantidade} ${unidade}`
                });
                
                showToast(`${quantidade} ${unidade} adicionados!`, 'success');
            } else {
                currentExpiry.setMinutes(currentExpiry.getMinutes() - minutos);
                
                if (currentExpiry < new Date()) {
                    showToast('Não pode expirar retroativamente', 'error');
                    closeModal('tempoModal');
                    return;
                }
                
                key.expiresAt = currentExpiry.toISOString();
                
                key.history.push({
                    date: new Date().toISOString(),
                    action: 'remove_tempo',
                    by: currentUser.username,
                    details: `-${quantidade} ${unidade}`
                });
                
                showToast(`${quantidade} ${unidade} removidos!`, 'success');
            }
            
            await saveData();
            addLog('MODIFICAR_TEMPO', { 
                key: key.key, 
                acao: currentAcao,
                quantidade: quantidade,
                unidade: unidade
            });
            
            closeModal('tempoModal');
            renderKeys();
            startTimer(currentKeyId, key.expiresAt);
        }

        async function deleteKey(keyId) {
            if (!confirm('Tem certeza?')) return;
            delete keys[keyId];
            await saveData();
            addLog('EXCLUIR_KEY', { key: keyId });
            showToast('Key excluída!', 'success');
            renderKeys();
            renderRecentKeys();
        }

        // ============================================
        // API DE VALIDAÇÃO (PARA O SCRIPT LUA)
        // ============================================
        window.validateKey = async function(key, hwid, nick, userId) {
            console.log('🔑 Validando:', {key, hwid, nick, userId});
            
            const keyId = key.replace(/-/g, '_');
            const keyData = keys[keyId];
            
            if (!keyData) {
                console.log('❌ Key não encontrada');
                return 'invalida';
            }
            
            if (keyData.paused) {
                console.log('⏸️ Key pausada');
                return 'pausada';
            }
            
            const expiresAt = new Date(keyData.expiresAt);
            if (expiresAt <= new Date()) {
                console.log('⌛ Key expirada');
                return 'expirada';
            }
            
            if (keyData.used) {
                if (keyData.hwidUsado === hwid) {
                    console.log('✅ Key já era deste HWID');
                    return 'valida';
                } else {
                    console.log('⚠️ Key usada por outro HWID');
                    return 'usada';
                }
            }
            
            // Key válida - marcar como usada
            keyData.used = true;
            keyData.usedAt = new Date().toISOString();
            keyData.hwidUsado = hwid;
            keyData.nickUsado = nick;
            keyData.userId = userId;
            keyData.vinculadoAt = new Date().toISOString();
            
            keyData.history.push({
                date: new Date().toISOString(),
                action: 'used',
                by: hwid,
                details: `Vinculado a ${nick} (ID: ${userId})`
            });
            
            await saveData();
            addLog('KEY_USADA', { key, hwid, nick, userId });
            
            console.log('✅ Key validada com sucesso!');
            return 'valida';
        };

        // ============================================
        // UTILITÁRIOS
        // ============================================
        function addLog(action, details) {
            const log = {
                date: new Date().toISOString(),
                action: action,
                user: currentUser?.username || 'sistema',
                ...details
            };
            
            logs.unshift(log);
            if (logs.length > 1000) logs.pop();
            saveData();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
        }

        function filterKeys() {
            renderKeys();
        }

        function exportKeys() {
            const blob = new Blob([JSON.stringify(keys, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `keys_${new Date().toISOString()}.json`;
            a.click();
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        checkAuth();

        // Verificar se é requisição da API
        if (window.location.search.includes('key=') && 
            window.location.search.includes('hwid=') && 
            window.location.search.includes('nick=')) {
            
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            const hwid = urlParams.get('hwid');
            const nick = urlParams.get('nick');
            const userId = urlParams.get('userId') || '0';
            
            fetch(FIREBASE_URL + '.json')
                .then(r => r.json())
                .then(data => {
                    if (data) {
                        keys = data.keys || {};
                    }
                    return window.validateKey(key, hwid, nick, userId);
                })
                .then(result => {
                    document.body.innerHTML = result;
                });
        }
    </script>
</body>
</html>
